<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GastroDigest · Clínica Gastroenterológica en Huánuco</title>
  <meta name="description" content="Clínica Gastroenterológica GastroDigest en Huánuco. Reserva tu cita en línea con especialistas en endoscopía y colonoscopía, y consulta tus resultados en un portal seguro." />
  <meta name="theme-color" content="#0E4B42" />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="GastroDigest · Clínica Gastroenterológica" />
  <meta property="og:description" content="Atención digestiva experta en Huánuco. Reserva tu cita en línea y accede a tu portal del paciente." />
  <meta property="og:locale" content="es_PE" />

  <!-- Tipografía: Fraunces (títulos) + Inter (cuerpo/UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/motion.css" />
  <link rel="stylesheet" href="css/marketing.css" />
</head>
<body>
  <!-- Preloader: se oculta cuando la app está montada (preloader.js) -->
  <div id="preloader" class="preloader">
    <div class="preloader__logo">
      <span class="preloader__badge">G</span>
      <div class="preloader__text">
        <span class="preloader__name">GastroDigest</span>
        <span class="preloader__sub">Clínica Gastroenterológica</span>
      </div>
    </div>
    <div class="preloader__bar"><span></span></div>
  </div>

  <a class="skip-link" href="#app">Saltar al contenido</a>

  <!-- ===== Topbar utilitaria (se desplaza al hacer scroll; navbar.js) ===== -->
  <div id="site-topbar"></div>

  <!-- ===== Navbar fija (montado por navbar.js) ===== -->
  <header id="site-nav"></header>

  <!-- ===== Contenido (vistas montadas aquí, a todo el ancho) ===== -->
  <main id="app" tabindex="-1"></main>

  <!-- ===== Footer (montado por footer.js) ===== -->
  <footer id="site-footer"></footer>

  <!-- Raíces de feedback (sin alert nativo) -->
  <div class="toast-root" id="toast-root" aria-live="polite" aria-atomic="false"></div>
  <div id="modal-root"></div>

  <!-- Configuración de entorno (regenerada en build de Vercel) -->
  <script src="js/config.js"></script>
  <!-- Aplicación (módulos ES) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
